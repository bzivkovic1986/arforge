swc:
  name: "PlatformSWC"
  category: "application"
  runnables:
    - name: "Init"
      initEvent: true
      writes:
        - port: "Pp_EcuVariant"
          dataElement: "Data"
        - port: Pp_MeasQueued
          dataElement: Value
    - name: "Cyclic_10ms"
      timingEventMs: 10
      calls:
        - port: Rp_FakeChipHandling
          operation: GetHealthStatus
        - port: Rp_FakeChipHandling
          operation: GetVoltage
    - name: "Runnable_GetEventStatus"
      operationInvokedEvents:
        - port: "Pp_DiagHandling"
          operation: "GetEventStatus"
    - name: "Runnable_SetEventStatus"
      operationInvokedEvents:
        - port: "Pp_DiagHandling"
          operation: "SetEventStatus"
  ports:
    - name: "Pp_EcuVariant"
      direction: "provides"
      interfaceRef: "If_EcuVariant"
    - name: "Pp_DiagHandling"
      direction: provides
      interfaceRef: If_DiagHandling
    - name: "Rp_FakeChipHandling"
      direction: requires
      interfaceRef: If_FakeChipHandling
      comSpec:
        callMode: asynchronous
    - name: Pp_MeasQueued
      interfaceRef: If_MeasurementsQueued
      direction: provides
    - name: Pp_CanState
      interfaceRef: If_CanCommState
      direction: provides