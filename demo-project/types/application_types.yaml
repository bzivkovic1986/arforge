# ARForge: Application data types
# Defines project-level application types used by interfaces.
applicationDataTypes:
  - name: "App_VehicleSpeed"
    description: "Vehicle speed value shared between the demo SWC types."
    implementationTypeRef: "Impl_VehicleSpeed_U16"
    constraint:
      min: 0
      max: 250
    unitRef: "km_per_h"
    compuMethodRef: "CM_VehicleSpeed_Kph"
  - name: "App_EcuVariant"
    description: "Ecu Variant information"
    implementationTypeRef: "Impl_EcuVariant_Enum"
    compuMethodRef: "CM_EcuVariant_Table"
  - name: "App_DtcCode"
    description: "DTC Code value"
    implementationTypeRef: Impl_DtcCode_U16
    compuMethodRef: CM_DtcCode_Linear
    unitRef: val
  - name: App_DtcStatus
    description: "Dtc Status value"
    implementationTypeRef: "Impl_DtcStatus_Enum"
    compuMethodRef: "CM_DtcStatus_Enum"
  - name: App_ChipHealthStatus
    description: "Health status of the chip"
    implementationTypeRef: "Impl_ChipHealthStatus"
    compuMethodRef: "CM_ChipHealthStatus_Enum"