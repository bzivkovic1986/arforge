# ARForge: Compu methods
# Simple physical scaling definitions for application data types.
compuMethods:
  - name: "CM_VehicleSpeed_Kph"
    description: "Identity scaling for the demo vehicle speed value."
    category: "linear"
    unitRef: "km_per_h"
    factor: 1.0
    offset: 0.0
    physMin: 0
    physMax: 250
  - name: "CM_EcuVariant_Table"
    description: "ECU Variant table definition"
    category: "textTable"
    entries:
      - value: 0
        label: "Variant A"
      - value: 1
        label: "Variant B"
      - value: 2
        label: "Variant C"
  - name: "CM_DtcCode_Linear"
    description: "DTC Code value definition"
    category: "linear"
    factor: 1
    offset: 0
    unitRef: "val"
  - name: "CM_DtcStatus_Enum"
    description: "DTC status table definition"
    category: "textTable"
    entries:
      - value: 0
        label: "DTC passed"
      - value: 1
        label: "DTC failed"
      - value: 2
        label: "DTC prepassed"
      - value: 3
        label: "DTC prefailed"
  - name: "CM_ChipHealthStatus_Enum"
    category: "textTable"
    entries:
      - value: 0
        label: "Chip OK"
      - value: 1
        label: "Chip overvoltage error"
      - value: 2
        label: "Chip undervoltage error"
  - name: CM_MeasurementValue_Raw
    category: linear
    factor: 1
    offset: 0
    unitRef: val