# ARForge: System composition
# Support system for invalid fixtures that exercise client-server examples.
system:
  name: "DemoSystem"
  composition:
    name: "Composition_DemoSystem"
    components:
      - name: "SpeedSensor_1"
        typeRef: "SpeedSensor"
      - name: "SpeedConsumer_1"
        typeRef: "SpeedConsumer"
    connectors:
      - from: "SpeedSensor_1.Pp_VehicleSpeed"
        to: "SpeedConsumer_1.Rp_VehicleSpeed"
      - from: "SpeedSensor_1.Pp_Diag"
        to: "SpeedConsumer_1.Rp_Diag"
      - from: "SpeedSensor_1.Pp_Diag"
        to: "SpeedConsumer_1.Rp_DiagAsync"
