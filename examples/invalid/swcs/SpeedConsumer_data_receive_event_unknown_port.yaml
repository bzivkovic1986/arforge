swc:
  name: "SpeedConsumer"
  runnables:
    - name: "Runnable_UseSpeed"
      timingEventMs: 10
      reads:
        - port: "Rp_VehicleSpeed"
          dataElement: "VehicleSpeed"
      calls:
        - port: "Rp_Diag"
          operation: "ReadDTC"
    - name: "Runnable_OnVehicleSpeed"
      dataReceiveEvents:
        - port: "Rp_Unknown"
          dataElement: "VehicleSpeed"
  ports:
    - name: "Rp_VehicleSpeed"
      direction: "requires"
      interfaceRef: "If_VehicleSpeed"
    - name: "Rp_Diag"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
    - name: "Rp_DiagAsync"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
