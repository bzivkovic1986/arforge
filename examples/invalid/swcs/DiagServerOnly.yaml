swc:
  name: "DiagServerOnly"
  runnables:
    - name: "Runnable_DiagServer"
      operationInvokedEvents:
        - port: "Pp_Diag"
          operation: "ReadDTC"
        - port: "Pp_Diag"
          operation: "ClearDTC"
        - port: "Pp_Diag"
          operation: "LogEvent"
  ports:
    - name: "Pp_Diag"
      direction: "provides"
      interfaceRef: "If_Diagnostics"
