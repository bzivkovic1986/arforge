# ARForge: Invalid example fixture
# Domain: software component validation.
# Provides an equal-timing SR consumer for timing analysis tests.
swc:
  name: "SpeedConsumer"
  description: "Consumes speed data with a 10 ms cyclic runnable."
  category: "application"
  runnables:
    - name: "Runnable_UseSpeed"
      timingEventMs: 10
      reads:
        - port: "Rp_VehicleSpeed"
          dataElement: "VehicleSpeed"
      calls:
        - port: "Rp_Diag"
          operation: "ReadDTC"
          timeoutMs: 100
        - port: "Rp_DiagAsync"
          operation: "ClearDTC"
        - port: "Rp_DiagAsync"
          operation: "LogEvent"
    - name: "Runnable_OnVehicleSpeed"
      dataReceiveEvents:
        - port: "Rp_VehicleSpeed"
          dataElement: "VehicleSpeed"
  ports:
    - name: "Rp_VehicleSpeed"
      direction: "requires"
      interfaceRef: "If_VehicleSpeed"
      comSpec:
        mode: "queued"
        queueLength: 8
    - name: "Rp_Diag"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
      comSpec:
        callMode: "synchronous"
        timeoutMs: 50
    - name: "Rp_DiagAsync"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
      comSpec:
        callMode: "asynchronous"
