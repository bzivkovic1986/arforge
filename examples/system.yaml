# ARForge: System composition
# Defines component prototypes and connectors between ports.
system:
  name: "DemoSystem"
  composition:
    name: "Composition_DemoSystem"
    components:
      - name: "SpeedSensor_1"
        typeRef: "SpeedSensor"
      - name: "SpeedSensor_2"
        typeRef: "SpeedSensor"
      - name: "SpeedConsumer_1"
        typeRef: "SpeedConsumer"
      - name: "SpeedConsumer_2"
        typeRef: "SpeedConsumer"
    connectors:
      - from: "SpeedSensor_1.Pp_VehicleSpeed"
        to: "SpeedConsumer_1.Rp_VehicleSpeed"
      - from: "SpeedSensor_2.Pp_VehicleSpeed"
        to: "SpeedConsumer_2.Rp_VehicleSpeed"
      - from: "SpeedSensor_1.Pp_Diag"
        to: "SpeedConsumer_1.Rp_Diag"
      - from: "SpeedSensor_1.Pp_Diag"
        to: "SpeedConsumer_1.Rp_DiagAsync"
      - from: "SpeedSensor_2.Pp_Diag"
        to: "SpeedConsumer_2.Rp_Diag"
      - from: "SpeedSensor_2.Pp_Diag"
        to: "SpeedConsumer_2.Rp_DiagAsync"

