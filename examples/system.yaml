system:
  name: "DemoSystem"
  instances:
    - name: "SpeedSensor_1"
      typeRef: "SpeedSensor"
    - name: "SpeedConsumer_1"
      typeRef: "SpeedConsumer"
  connections:
    - from: "SpeedSensor_1.Pp_VehicleSpeed"
      to: "SpeedConsumer_1.Rp_VehicleSpeed"
      dataElement: "VehicleSpeed"
    - from: "SpeedSensor_1.Pp_Diag"
      to: "SpeedConsumer_1.Rp_Diag"
      operation: "ReadDTC"
