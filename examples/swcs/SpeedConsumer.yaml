swc:
  name: "SpeedConsumer"
  runnables:
    - name: "Runnable_UseSpeed"
      timingEventMs: 10
      reads:
        - port: "Rp_VehicleSpeed"
          dataElement: "VehicleSpeed"
      calls:
        - port: "Rp_Diag"
          operation: "ReadDTC"
        - port: "Rp_DiagAsync"
          operation: "ClearDTC"
        - port: "Rp_DiagAsync"
          operation: "LogEvent"
  ports:
    - name: "Rp_VehicleSpeed"
      direction: "requires"
      interfaceRef: "If_VehicleSpeed"
      comSpec:
        mode: "queued"
        queueLength: 8
    - name: "Rp_Diag"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
      comSpec:
        callMode: "synchronous"
        timeoutMs: 50
    - name: "Rp_DiagAsync"
      direction: "requires"
      interfaceRef: "If_Diagnostics"
      comSpec:
        callMode: "asynchronous"
