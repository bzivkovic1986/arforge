# ARForge: Interface definition
# Defines a Sender-Receiver or Client-Server AUTOSAR interface.
interface:
  name: "If_VehicleSpeed"
  description: "Provides vehicle speed related sender-receiver data."
  type: "senderReceiver"
  dataElements:
    - name: "VehicleSpeed"
      description: "Current vehicle speed in km/h."
      typeRef: "App_VehicleSpeed"
    - name: "WheelSpeeds"
      typeRef: "Impl_WheelSpeeds"
    - name: "VehicleSnapshot"
      typeRef: "Impl_Outer"
    - name: "WheelSpeed"
      typeRef: "SpeedPair_T"

